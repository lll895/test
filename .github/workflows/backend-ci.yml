# ============================================================================
# 企业知识库 RAG 问答系统 - 后端 CI 工作流
# 功能：代码推送/PR 时自动运行单元测试和覆盖率检查
# ============================================================================

name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'server/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    services:
      # 使用 MySQL 服务容器进行集成测试
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: dbenterprise_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    # 使用 Redis 服务容器测试缓存
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'server/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt
          # 安装 Sentry SDK 用于集成测试
          pip install sentry-sdk

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 server/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 server/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        run: |
          cd server
          python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --timeout=30
        env:
          # 测试环境配置
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-secret
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: dbenterprise_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          LOG_LEVEL: WARNING
          OLLAMA_BASE_URL: http://localhost:11434
          # 测试环境不连接真实 LLM
          LLM_MODEL: test-model

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: server/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: server/coverage.xml
